version: 1
customRules:
  - source: /google3ec01a937de10d17.html
    target: /google3ec01a937de10d17.html
    status: '200'
  - source: /acm-observabilidad-en-azure.html
    target: https://k8s.manriquegarcia.com/acm-observabilidad-en-azure.html
    status: '301'
  - source: /acm-observabilidad-en-azure
    target: https://k8s.manriquegarcia.com/acm-observabilidad-en-azure.html
    status: '301'
  - source: /primer-post.html
    target: https://k8s.manriquegarcia.com/primer-post.html
    status: '301'
  - source: /primer-post
    target: https://k8s.manriquegarcia.com/primer-post.html
    status: '301'
customHeaders:
  - pattern: '**/*'
    headers:
      - key: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains; preload
      - key: X-Content-Type-Options
        value: nosniff
      - key: X-Frame-Options
        value: DENY
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
      - key: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(self)
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .svelte-kit/**/*
